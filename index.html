    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /*Esse elemento altera a forma e o tamanho total.*/
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f5f5f5;
      }
      .caixa1 {
        width: 100%;
        height: 90px;
        background-color: rgb(192, 180, 165);
        border: 5px solid rgb(122, 107, 107);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
      }
      .logo {
        width: auto;
        height: auto;
      }
      .pesquisa {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 0 30px;
        position: relative;
      }
      .pesquisa input {
        width: 100%;
        max-width: 500px;
        padding: 12px 45px 12px 12px;
        border-radius: 8px;
        border: none;
        outline: none; /*serve para retirar o contorno do botão */
        font-size: 16px;
      }
      .pesquisa img {
        width: auto;
        height: auto;
        position: absolute;
        right: calc(50% - 250px + 10px); /*define a distância da borda direita do elemento em relação à borda direita da tela*/
        top: 50%; /*empurra a parte superior do elemento para exatamente a metade da altura */
        transform: translateY(-50%); /*corrige a centralização vertical*/
      }
      .carrinho img {
        width: 50px;
        height: 50px;
      }
      .banner {
        display: flex;
        justify-content: center;
      }
      .produto {
        width: 400px;
        height: 400px;
        background-color: rgb(192, 180, 165);
        border: 5px solid rgb(122, 107, 107);
        margin: 10px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .produto img {
        height: 70%;
        width: auto;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        margin-top: 5%;
      }
      .produtobotao {
        height: 40px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 1%;
      }

      .secaoproduto {
        display: flex;
        justify-content: center;
      }
      .redor {
        display: flex;
        justify-content: center;
      }
      .caixa2 {
        width: 600px;
        height: 200px;
        background-color: rgb(192, 180, 165);
        border: 5px solid rgb(122, 107, 107);
        margin: 10px;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        flex-direction: column;
      }
      .caixa2 input {
        height: 40px;
        font-size: 16px;
        width: 500px;
        border-radius: 8px;
        padding-left: 10px;
        margin: auto;
        border: none;
        outline: none;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .caixa2botao {
        height: 20px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 2%;
      }
      .rodapé {
        width: 100%;
        height: 40px;
        background-color: rgb(192, 180, 165);
        border: 5px solid rgb(122, 107, 107);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 30px;
      }
      a {
        color: rgb(122, 107, 107);
      }
      button {
        background-color: rgb(161, 151, 151);
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
      }
    </style>
